name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Python syntax check
        run: python -m py_compile scripts/run_full_pipeline.py tools/*.py

      - name: Smoke test full pipeline
        run: python scripts/run_full_pipeline.py --smoke-test --run-id spatialflow-smoke-ci
